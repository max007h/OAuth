<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Banking POC</title>
</head>
<body>
<h2>Virement Bancaire – PAR + RAR</h2>

<label>IBAN:</label><br>
<input type="text" id="iban" value="FR7630004000031234567890143" size="40"><br><br>

<label>Montant:</label><br>
<input type="number" id="amount" value="15000"><br><br>

<label>Devise:</label><br>
<select id="currency">
  <option>EUR</option>
  <option>USD</option>
  <option>GBP</option>
</select><br><br>

<label>Libellé:</label><br>
<input type="text" id="lbl" value="loyer"><br><br>

<button onclick="initier()">Initier le virement</button>

<br><br>
<div id="result"></div>

<script>
  const PF       = 'https://localhost:9031';
  const PROXY    = 'http://localhost:9032';
  const CLIENT   = 'banking-spa';
  const REDIRECT = 'http://localhost:4200';
  const SCOPE    = 'openid payment:read banking_transfert';
  const VERIFIER = 'dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk';
  const CHALLENGE= 'E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM';

  function rar() {
    return JSON.stringify([{
      type: 'bankingTransfert',
      iban: document.getElementById('iban').value,
      amount: parseInt(document.getElementById('amount').value),
      currency: document.getElementById('currency').value,
      label: document.getElementById('lbl').value
    }]);
  }

  function initier() {
    document.getElementById('result').textContent = 'Envoi PAR...';
    const body = new URLSearchParams({
      client_id: CLIENT,
      response_type: 'code',
      redirect_uri: REDIRECT,
      scope: SCOPE,
      code_challenge: CHALLENGE,
      code_challenge_method: 'S256',
      authorization_details: rar()
    });

    fetch(PROXY + '/as/par.oauth2', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: body.toString()
    })
    .then(r => r.json())
    .then(data => {
      document.getElementById('result').textContent = 'PAR OK - redirect...';
      window.location.href = PF + '/as/authorization.oauth2?client_id=' + CLIENT + '&request_uri=' + encodeURIComponent(data.request_uri);
    })
    .catch(e => {
      document.getElementById('result').textContent = 'Erreur PAR: ' + e;
    });
  }

  // Callback
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    document.getElementById('result').textContent = 'Erreur: ' + (params.get('error_description') || error);
  } else if (code) {
    document.getElementById('result').textContent = 'Token exchange...';
    fetch(PROXY + '/as/token.oauth2', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        client_id: CLIENT,
        code: code,
        redirect_uri: REDIRECT,
        code_verifier: VERIFIER
      }).toString()
    })
    .then(r => r.json())
    .then(data => {
      document.getElementById('result').textContent = 'ACCESS TOKEN:\n\n' + data.access_token;
      window.history.replaceState({}, '', '/');
    })
    .catch(e => {
      document.getElementById('result').textContent = 'Erreur token: ' + e;
    });
  }
</script>
</body>
</html>
